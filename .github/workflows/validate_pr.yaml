name: CI Validation

on:
  pull_request:
    branches:
      - master
    # types są potrzebne, aby linter PR reagował na edycję tytułu
    types:
      - opened
      - edited
      - synchronize


jobs:
  validate:
    name: Validate XML & PR Title
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Sprawdzenie czy tytuł PR pasuje do Twoich reguł (feat, fix, perf, cleanup)
      - name: Semantic PR Title Check
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Definiujemy typy, które akceptuje Twoja konfiguracja semantic-release
          types: |
            feat
            fix
            perf
            cleanup
            chore
          requireScope: false

      # 2. Setup pod walidację XML
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          pip install lxml
          git clone https://github.com/ardupilot/pymavlink.git --recursive
          pip install -r pymavlink/requirements.txt

      # 3. Walidacja XML
      - name: Validate XML with mavgen
        run: |
          python3 -m pymavlink.tools.mavgen \
            --lang=C \
            --wire-protocol=1.0 \
            --output=temp_output \
            --strict-units \
            ./simba.xml