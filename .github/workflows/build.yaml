---
name: Build Mavlink Definitions
on:
  push:
    tags:
      - '*'
  workflow_dispatch:

env:
  MAVLINK_VERSION: "1.0"
  DEFINITION_FILE: "simba.xml"
  ADDITIONAL_FLAGS: "--strict-units"

jobs:
  build:
    name: Build Mavlink 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Requirements
        run: |
          sudo apt-get update
          sudo apt-get install -y git python3-pip zip
          git clone https://github.com/ardupilot/pymavlink.git --recursive
          pip install -r pymavlink/requirements.txt --break-system-packages
          pip install lxml --break-system-packages

      - name: Generate Files
        run: |
          mkdir -p output/mavlink_python

          LANGS=("C:mavlink" "WLua:simba_mavlink_wireshark" "Python:output/mavlink_python/simba_dialects.py")

          for ENTRY in "${LANGS[@]}"; do
            IFS=":" read -r LANG OUT <<< "$ENTRY"
            echo "Generating MAVLink for $LANG..."
            
            python3 -m pymavlink.tools.mavgen \
              --lang=$LANG \
              --wire-protocol=${{ env.MAVLINK_VERSION }} \
              --output=$OUT \
              ${{ env.ADDITIONAL_FLAGS }} \
              ${{ env.DEFINITION_FILE }}
          done

      - name: Create Zip
        run: |
          zip -r simba_mavlink.zip mavlink
          
      - name: Release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          make_latest: true
          generate_release_notes: true
          files: |
            simba_mavlink.zip
            simba_mavlink_wireshark.lua
            output/mavlink_python/simba_dialects.py
            README.md
            
